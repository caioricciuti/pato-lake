name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: make build-frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ui/dist/
          retention-days: 1

  build-binary:
    needs: build-frontend
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: patolake-linux-amd64
            cc: gcc
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            binary: patolake-linux-arm64
            cc: gcc
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            binary: patolake-darwin-amd64
            cc: "clang -arch x86_64"
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            binary: patolake-darwin-arm64
            cc: clang
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ui/dist/

      - name: Build binary
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${DATE}"
          CC="${{ matrix.cc }}" CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "${LDFLAGS}" -o dist/${{ matrix.binary }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
          retention-days: 1

  release:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: patolake-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Alpine smoke test (linux-amd64)
        run: |
          chmod +x dist/patolake-linux-amd64
          docker run --rm -v "$PWD/dist:/dist:ro" alpine:3.20 /dist/patolake-linux-amd64 version

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum patolake-* > checksums.txt
          cat checksums.txt

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          TAG="${VERSION}"
          TITLE="${TAG}"
          REPO="${{ github.repository }}"
          NOTES_FILE="$(mktemp)"

          cat > "${NOTES_FILE}" <<EOF
          ## Install

          Download the binary for your platform and run it:

          \`\`\`bash
          # Linux (amd64)
          curl -L -o patolake https://github.com/${REPO}/releases/download/${TAG}/patolake-linux-amd64
          chmod +x patolake
          sudo install -m 755 patolake /usr/local/bin/patolake
          patolake
          \`\`\`

          If you don't want a global install, run it as \`./patolake\`.

          ## Verify checksum

          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`
          EOF

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}"
          else
            gh release create "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}"
          fi

          gh release upload "${TAG}" \
            dist/patolake-linux-amd64 \
            dist/patolake-linux-arm64 \
            dist/patolake-darwin-amd64 \
            dist/patolake-darwin-arm64 \
            dist/checksums.txt \
            --clobber

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify GHCR credentials
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -z "${GHCR_PAT}" ]; then
            echo "GHCR_PAT secret is required to publish ghcr.io/${{ github.repository }} images."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
